  html,body{margin:0;height:100%;}
  body{
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    color:var(--ink);
    background:var(--surface);
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- Encabezado delgado ---- */
  .topbar{
    flex:0 0 auto;
    display:flex;align-items:center;gap:clamp(16px,3vw,32px);
    height:58px;padding:0 clamp(14px,2.5vw,22px);
    background:#fff;border-bottom:1px solid var(--line);
    box-shadow:0 1px 2px rgba(33,28,61,.04);
    z-index:2;
  }
  .brand{display:flex;align-items:center;gap:10px;flex:0 0 auto;}
  .brand__logo{height:32px;width:auto;display:block;}
  .brand__name{
    font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:-.02em;
    font-size:23px;line-height:1;color:var(--ink);
  }

  /* ---- Pestañas en línea ---- */
  .tabs{
    display:flex;align-items:center;gap:4px;
    flex:1 1 auto;min-width:0;
    overflow-x:auto;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    display:inline-flex;align-items:center;gap:8px;
    flex:0 0 auto;
    border:0;background:transparent;cursor:pointer;
    font-family:inherit;font-size:14px;font-weight:600;letter-spacing:-.01em;
    color:var(--muted);
    padding:8px 14px;border-radius:11px;
    white-space:nowrap;
    transition:color .18s ease, background .18s ease;
  }
  .tab__icon{width:18px;height:18px;flex:0 0 auto;}
  .tab:hover{color:var(--ink);background:#f4f2fd;}
  .tab:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(96,64,240,.35);}
  .tab.is-active{color:var(--violet-deep);background:#efeafe;}
  .tab--tec.is-active{color:#5a59d6;background:#eceafc;}
  .tab--pru.is-active{color:#7b54e6;background:#f1ecfd;}
  .tab--tab.is-active{color:#6a45e0;background:#efeafe;}

  /* ---- Área de tableros (iframe a pantalla completa) ---- */
  .viewport{flex:1 1 auto;position:relative;min-height:0;background:var(--bg);}
  .board{
    position:absolute;inset:0;
    width:100%;height:100%;border:0;
    display:none;background:#fff;
  }
  .board.is-active{display:block;}

  @media (max-width:560px){
    .topbar{gap:12px;}
    .brand__logo{height:27px;}
    .brand__name{font-size:20px;}
    .tab__label{display:none;}
    .tab{padding:9px 11px;}
  }
  @media (prefers-reduced-motion:reduce){
    .tab{transition:none;}
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand__name">Prueba Final</span></div>
    <nav class="tabs" role="tablist" aria-label="Tableros de seguimiento">
        <button class="tab tab--est is-active" role="tab" aria-selected="true" aria-controls="board-0" id="tab-0" data-src="https://jbhuerta-sv.github.io/estudiantes/">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 4h9a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H8"/><path d="M8 4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2"/><path d="M5 4h3M5 12h3M5 20h3"/><path d="m10.5 11 1.8 1.8 3.2-3.6"/></svg>
          <span class="tab__label">Selección final</span>
        </button>
        <button class="tab tab--tec" role="tab" aria-selected="false" aria-controls="board-1" id="tab-1" data-src="https://jbhuerta-sv.github.io/tecnicos_ce/">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><path d="M16.5 4.5a3 3 0 0 1 0 6"/><path d="M17 13.6c2.4.5 4 2.3 4 4.9"/></svg>
          <span class="tab__label">Asistencia técnicos</span>
        </button>
        <button class="tab tab--pru" role="tab" aria-selected="false" aria-controls="board-2" id="tab-2" data-src="https://jbhuerta-sv.github.io/prueba/">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4 2.5 8.5 12 13l9.5-4.5L12 4Z"/><path d="M6.5 10.8V15c0 1.4 2.7 2.6 5.5 2.6s5.5-1.2 5.5-2.6v-4.2"/><path d="M21.5 8.5v5"/></svg>
          <span class="tab__label">Asistencia prueba</span>
        </button>
        <button class="tab tab--tab" role="tab" aria-selected="false" aria-controls="board-3" id="tab-3" data-src="https://clases-sv.github.io/tablets/">
          <svg class="tab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="3" width="14" height="18" rx="2.4"/><line x1="11" y1="17.6" x2="13" y2="17.6"/></svg>
          <span class="tab__label">Entrega de tablets</span>
        </button>
    </nav>
  </header>

  <main class="viewport">
      <iframe id="board-0" class="board is-active" role="tabpanel" aria-labelledby="tab-0" title="Estudiantes seleccionados para la prueba final" data-src="https://jbhuerta-sv.github.io/estudiantes/"></iframe>
      <iframe id="board-1" class="board" role="tabpanel" aria-labelledby="tab-1" title="Asistencia del equipo técnico por escuela" data-src="https://jbhuerta-sv.github.io/tecnicos_ce/" loading="lazy"></iframe>
      <iframe id="board-2" class="board" role="tabpanel" aria-labelledby="tab-2" title="Asistencia de estudiantes el día de la prueba" data-src="https://jbhuerta-sv.github.io/prueba/" loading="lazy"></iframe>
      <iframe id="board-3" class="board" role="tabpanel" aria-labelledby="tab-3" title="Entrega de tablets" data-src="https://clases-sv.github.io/tablets/" loading="lazy"></iframe>
  </main>

  <script>
    (function(){
      var tabs = Array.prototype.slice.call(document.querySelectorAll('.tab'));
      var boards = Array.prototype.slice.call(document.querySelectorAll('.board'));

      // El tablero vive en otro dominio, así que no podemos llamar a su mapa
      // directamente. Un cambio de ancho imperceptible dispara el evento
      // 'resize' dentro del iframe y hace que Leaflet recalcule su tamaño.
      function nudge(b){
        b.style.width = '99.9%';
        requestAnimationFrame(function(){
          b.style.width = '';
          // segundo reajuste por si el mapa tardó en montar (tiles, datos)
          setTimeout(function(){
            b.style.width = '99.95%';
            requestAnimationFrame(function(){ b.style.width = ''; });
          }, 400);
        });
      }

      function load(b){
        if (!b.getAttribute('src') && b.dataset.src){
          b.addEventListener('load', function(){ nudge(b); });
          b.setAttribute('src', b.dataset.src);
        }
      }

      function activate(i){
        tabs.forEach(function(t, j){
          var on = i === j;
          t.classList.toggle('is-active', on);
          t.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        boards.forEach(function(b, j){
          var on = i === j;
          b.classList.toggle('is-active', on);
          if (on){
            if (!b.getAttribute('src')) load(b);  // 1ª vez: carga diferida
            else nudge(b);                        // ya cargado: recalcular tamaño
          }
        });
      }

      // Carga el primer tablero cuando el layout ya tiene su tamaño definitivo,
      // para que el mapa se inicialice con las dimensiones correctas.
      function start(){ requestAnimationFrame(function(){ load(boards[0]); }); }
      if (document.readyState === 'complete') start();
      else window.addEventListener('load', start);

      tabs.forEach(function(tab, i){
        tab.addEventListener('click', function(){ activate(i); });
        tab.addEventListener('keydown', function(e){
          if (e.key === 'ArrowRight' || e.key === 'ArrowLeft'){
            e.preventDefault();
            var dir = e.key === 'ArrowRight' ? 1 : -1;
            var next = (i + dir + tabs.length) % tabs.length;
            tabs[next].focus();
            activate(next);
          }
        });
      });
    })();
  </script>
</body>
</html>
